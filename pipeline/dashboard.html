<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Pipeline Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --green: #3fb950; --red: #f85149; --amber: #d29922;
    --blue: #58a6ff; --purple: #bc8cff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 6px; }
  header h1 { font-size: 18px; margin: 0; }
  .task { color: var(--muted); font-size: 13px; flex: 1; min-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); }
  .badge.running { color: var(--blue); border-color: var(--blue); }
  .badge.done { color: var(--green); border-color: var(--green); }
  .badge.halted { color: var(--red); border-color: var(--red); }
  .badge.idle { color: var(--muted); }
  #halt-banner { display: none; background: #3d1418; border: 1px solid var(--red); color: #ffb3ad; border-radius: 8px; padding: 10px 14px; margin: 10px 0; font-size: 13px; }
  .rail { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0; }
  .stage { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: border-color .15s; position: relative; }
  .stage.selected { border-color: var(--blue); }
  .stage .name { font-weight: 600; text-transform: capitalize; display: flex; align-items: center; gap: 8px; }
  .stage .meta { color: var(--muted); font-size: 12px; margin-top: 6px; min-height: 18px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .stage.pending .dot { background: var(--muted); }
  .stage.running .dot { background: var(--blue); animation: pulse 1.1s infinite; }
  .stage.passed .dot { background: var(--green); }
  .stage.failed .dot, .stage.blocked .dot { background: var(--red); }
  @keyframes pulse { 50% { opacity: .3; } }
  .cycles { display: flex; gap: 4px; margin-top: 8px; }
  .cycles span { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--border); }
  .cycles span.done-ok { background: var(--green); border-color: var(--green); }
  .cycles span.done-fail { background: var(--amber); border-color: var(--amber); }
  .cycles span.active { background: var(--blue); border-color: var(--blue); animation: pulse 1.1s infinite; }
  .checkline { font-size: 12px; margin-top: 6px; }
  .checkline .ok { color: var(--green); } .checkline .bad { color: var(--red); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } .rail { grid-template-columns: repeat(2, 1fr); } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0; padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  #log { height: 420px; overflow-y: auto; padding: 12px 14px; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; word-break: break-word; color: #c9d1d9; }
  #log .tool { color: var(--purple); } #log .err { color: var(--red); } #log .sys { color: var(--muted); }
  .tabs { display: flex; gap: 2px; padding: 8px 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tabs button { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 6px 10px; font-size: 12.5px; cursor: pointer; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--blue); }
  .tabs button:disabled { opacity: .35; cursor: default; }
  #artifact { height: 384px; overflow-y: auto; padding: 14px 18px; }
  #artifact h1 { font-size: 18px; } #artifact h2 { font-size: 15px; margin-top: 18px; } #artifact h3 { font-size: 13.5px; }
  #artifact pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; font: 12px/1.5 ui-monospace, Menlo, monospace; }
  #artifact code { background: #21262d; border-radius: 4px; padding: 1px 5px; font: 12px ui-monospace, Menlo, monospace; }
  #artifact pre code { background: none; padding: 0; }
  #artifact ul { padding-left: 22px; }
  #artifact .empty { color: var(--muted); font-style: italic; }
  footer { color: var(--muted); font-size: 11.5px; margin-top: 14px; display: flex; justify-content: space-between; }
  #conn.on { color: var(--green); } #conn.off { color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚙️ Agent Pipeline</h1>
    <span id="overall" class="badge idle">idle</span>
    <span id="verdict" class="badge" style="display:none"></span>
    <div class="task" id="task">No pipeline run yet — start one with <code>bash .pipeline/spawn.sh "your task"</code></div>
  </header>
  <div id="halt-banner"></div>

  <div class="rail" id="rail"></div>

  <div class="cols">
    <div class="panel">
      <h2>Live activity <span id="log-stage" style="text-transform:none"></span></h2>
      <div id="log"></div>
    </div>
    <div class="panel">
      <h2>Artifacts</h2>
      <div class="tabs" id="tabs"></div>
      <div id="artifact"><div class="empty">No artifacts yet.</div></div>
    </div>
  </div>

  <footer>
    <span>Watching <code>.pipeline/</code> via SSE</span>
    <span id="conn" class="off">● disconnected</span>
  </footer>
</div>

<script>
const STAGE_ORDER = ['planner', 'coder', 'tester', 'reviewer'];
const ARTIFACT_TABS = [
  ['specs.md', 'Spec'], ['changes.md', 'Changes'], ['checker_report.md', 'Checker'],
  ['test_suite.md', 'Tests'], ['review_report.md', 'Review'],
];
let state = null;
let selectedStage = null;   // manual stage selection for the log panel
let selectedTab = 'specs.md';
let pinnedTab = false;      // user clicked a tab → stop auto-following

const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

// Minimal markdown renderer: headings, fenced code, bold/italic/inline code, lists, hr.
function renderMd(md) {
  const blocks = md.split(/```/);
  let html = '';
  blocks.forEach((block, i) => {
    if (i % 2 === 1) { // inside a fence; first line may be a language tag
      const nl = block.indexOf('\n');
      const body = nl >= 0 ? block.slice(nl + 1) : block;
      html += '<pre><code>' + esc(body) + '</code></pre>';
      return;
    }
    const lines = block.split('\n');
    let inList = false, para = [];
    const flush = () => { if (para.length) { html += '<p>' + para.join(' ') + '</p>'; para = []; } };
    const inline = (s) => esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*(?!\s)([^*]+)\*/g, '<em>$1</em>');
    for (const line of lines) {
      const h = line.match(/^(#{1,4})\s+(.*)/);
      if (h) { flush(); if (inList) { html += '</ul>'; inList = false; } html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
      if (/^\s*[-*]\s+/.test(line)) { flush(); if (!inList) { html += '<ul>'; inList = true; } html += '<li>' + inline(line.replace(/^\s*[-*]\s+/, '')) + '</li>'; continue; }
      if (inList && line.trim() === '') { html += '</ul>'; inList = false; continue; }
      if (/^\s*---+\s*$/.test(line)) { flush(); html += '<hr>'; continue; }
      if (line.trim() === '') { flush(); continue; }
      para.push(inline(line));
    }
    flush(); if (inList) html += '</ul>';
  });
  return html;
}

function fmtDuration(a, b) {
  if (!a) return '';
  const ms = (b ? new Date(b) : new Date()) - new Date(a);
  const s = Math.floor(ms / 1000);
  return s < 60 ? s + 's' : Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}

function renderRail() {
  const rail = document.getElementById('rail');
  const stages = state?.status?.stages || STAGE_ORDER.map((name) => ({ name, status: 'pending', cycle: 0 }));
  rail.innerHTML = '';
  for (const st of stages) {
    const div = document.createElement('div');
    div.className = 'stage ' + st.status + (selectedStage === st.name ? ' selected' : '');
    let cyclesHtml = '';
    if (st.name === 'coder' && (st.cycle > 0 || st.status !== 'pending')) {
      const max = st.maxCycles || 5;
      cyclesHtml = '<div class="cycles" title="fix cycles">';
      for (let i = 1; i <= max; i++) {
        let cls = '';
        if (i < st.cycle) cls = 'done-fail';
        else if (i === st.cycle) cls = st.status === 'running' ? 'active' : (st.status === 'passed' ? 'done-ok' : 'done-fail');
        cyclesHtml += `<span class="${cls}"></span>`;
      }
      cyclesHtml += '</div>';
    }
    let checkHtml = '';
    if (st.checks) {
      checkHtml = `<div class="checkline"><span class="ok">✓ ${st.checks.passedCount ?? '?'} passed</span>` +
        (st.checks.failedCount ? ` · <span class="bad">✗ ${st.checks.failedCount} failed</span>` : '') + '</div>';
    }
    const meta = st.status === 'running'
      ? `running · ${fmtDuration(st.startedAt)}${st.name === 'coder' ? ` · cycle ${st.cycle}/${st.maxCycles}` : ''}`
      : st.status === 'pending' ? 'pending'
      : `${st.status}${st.endedAt ? ' · ' + fmtDuration(st.startedAt, st.endedAt) : ''}${st.detail ? ' · ' + st.detail : ''}`;
    div.innerHTML = `<div class="name"><span class="dot"></span>${st.name}</div><div class="meta">${esc(meta)}</div>${cyclesHtml}${checkHtml}`;
    div.onclick = () => { selectedStage = st.name; renderAll(); };
    rail.appendChild(div);
  }
}

function activeLogStage() {
  if (selectedStage) return selectedStage;
  const stages = state?.status?.stages || [];
  const running = stages.find((s) => s.status === 'running');
  if (running) return running.name;
  const started = stages.filter((s) => s.startedAt);
  return started.length ? started[started.length - 1].name : 'planner';
}

function renderLog() {
  const stage = activeLogStage();
  document.getElementById('log-stage').textContent = '— ' + stage;
  const el = document.getElementById('log');
  const raw = state?.logs?.[stage] || '';
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
  el.innerHTML = raw.split('\n').map((line) => {
    let cls = '';
    if (line.startsWith('[tool]')) cls = 'tool';
    else if (line.startsWith('[stderr]') || line.startsWith('[error]')) cls = 'err';
    else if (line.startsWith('=====') || line.startsWith('[session]') || line.startsWith('[result]')) cls = 'sys';
    return `<div class="${cls}">${esc(line)}</div>`;
  }).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  const available = new Set(state?.artifacts || []);
  for (const [file, label] of ARTIFACT_TABS) {
    const b = document.createElement('button');
    b.textContent = label;
    b.disabled = !available.has(file);
    b.className = selectedTab === file ? 'active' : '';
    b.onclick = () => { selectedTab = file; pinnedTab = true; renderTabs(); loadArtifact(); };
    tabs.appendChild(b);
  }
  // Auto-follow the newest artifact until the user pins a tab.
  if (!pinnedTab) {
    for (const [file] of [...ARTIFACT_TABS].reverse()) {
      if (available.has(file)) { if (selectedTab !== file) { selectedTab = file; loadArtifact(); } break; }
    }
  }
}

async function loadArtifact() {
  const el = document.getElementById('artifact');
  try {
    const r = await fetch('/api/artifact?name=' + encodeURIComponent(selectedTab));
    const { content } = await r.json();
    el.innerHTML = content ? renderMd(content) : '<div class="empty">Empty.</div>';
  } catch { el.innerHTML = '<div class="empty">Failed to load.</div>'; }
}

function renderHeader() {
  const s = state?.status;
  const overall = document.getElementById('overall');
  const verdict = document.getElementById('verdict');
  const banner = document.getElementById('halt-banner');
  if (!s) { overall.textContent = 'idle'; overall.className = 'badge idle'; return; }
  document.getElementById('task').textContent = (s.runner ? `[${s.runner}] ` : '') + s.task;
  overall.textContent = s.overall;
  overall.className = 'badge ' + s.overall;
  if (s.verdict) {
    verdict.style.display = '';
    verdict.textContent = s.verdict;
    verdict.className = 'badge ' + (s.verdict === 'APPROVED' ? 'done' : 'halted');
  } else verdict.style.display = 'none';
  if (s.haltReason) {
    const failing = s.stages.find((x) => x.status === 'failed' || x.status === 'blocked');
    banner.style.display = 'block';
    banner.textContent = `⛔ ${s.haltReason}: ${failing?.detail || 'pipeline halted — human intervention required.'}`;
  } else banner.style.display = 'none';
}

function renderAll() { renderHeader(); renderRail(); renderLog(); renderTabs(); }

async function fetchState() {
  try {
    state = await (await fetch('/api/state')).json();
    renderAll();
  } catch {}
}

function connectSSE() {
  const conn = document.getElementById('conn');
  const es = new EventSource('/events');
  es.onopen = () => { conn.textContent = '● live'; conn.className = 'on'; };
  es.onerror = () => { conn.textContent = '● reconnecting…'; conn.className = 'off'; };
  es.onmessage = (m) => {
    try { if (JSON.parse(m.data).type === 'change') { fetchState(); if (pinnedTab) loadArtifact(); } } catch {}
  };
}

fetchState();
connectSSE();
setInterval(fetchState, 3000); // fallback poll + duration ticker
</script>
</body>
</html>
