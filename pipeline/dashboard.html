<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Workspace</title>
<style>
  :root {
    --bg: #f4f4f2; --panel: #ffffff; --sidebar: #fafaf8; --border: #e7e5e2;
    --text: #1c1917; --muted: #78716c; --faint: #a8a29e;
    --surface: #ffffff; --surface-muted: #f7f6f4; --surface-hover: #f0efec;
    --inverse: #1c1917; --on-inverse: #ffffff; --neutral: #d6d3d1;
    --green: #16a34a; --green-bg: #dcfce7; --green-text: #166534;
    --amber-bg: #fef3c7; --amber-text: #92400e;
    --red: #dc2626; --red-bg: #fee2e2; --red-text: #991b1b;
    --purple-bg: #ede9fe; --purple-text: #6d28d9; --purple-border: #ddd6fe;
    --orange: #ea580c; --code-bg: #f5f5f3; --accent-row: #fdf3e7;
    --info-bg: #eff6ff; --info-text: #1e40af; --info-border: #dbeafe;
    --halt-border: #fecaca; --halt-input-border: #fca5a5;
    --pre-bg: #ffffff; --inline-code-bg: #ebe9e6;
    --diff-bg: #ffffff; --diff-add-bg: #f0fdf4; --diff-add-text: #166534;
    --diff-del-bg: #fef2f2; --diff-del-text: #991b1b;
    --diff-hunk-bg: #faf5ff; --diff-hunk-text: #7c3aed;
    --syntax-kw: #7c3aed; --syntax-str: #b45309; --syntax-cmt: #9ca3af; --syntax-typ: #0e7490;
    --terminal-bg: #1c1917; --terminal-text: #e7e5e4; --terminal-muted: #a8a29e;
    --overlay: rgba(28, 25, 23, .35); --shadow: rgba(0, 0, 0, .2);
    --shadow-sm: rgba(0, 0, 0, .06);
    --agent-planner-bg: #ede9fe; --agent-planner-fg: #6d28d9;
    --agent-coder-bg: #dbeafe; --agent-coder-fg: #1d4ed8;
    --agent-tester-bg: #dcfce7; --agent-tester-fg: #166534;
    --agent-reviewer-bg: #fef3c7; --agent-reviewer-fg: #92400e;
    --topbar-h: 52px;
    --sidebar-w: 236px;
  }
  [data-theme="dark"] {
    --bg: #1c1917; --panel: #292524; --sidebar: #231f1e; --border: #44403c;
    --text: #fafaf9; --muted: #a8a29e; --faint: #78716c;
    --surface: #292524; --surface-muted: #1c1917; --surface-hover: #3f3a36;
    --inverse: #fafaf9; --on-inverse: #1c1917; --neutral: #57534e;
    --green: #22c55e; --green-bg: #14532d; --green-text: #86efac;
    --amber-bg: #451a03; --amber-text: #fcd34d;
    --red: #ef4444; --red-bg: #450a0a; --red-text: #fca5a5;
    --purple-bg: #2e1065; --purple-text: #c4b5fd; --purple-border: #4c1d95;
    --orange: #f97316; --code-bg: #1c1917; --accent-row: #3b2f1f;
    --info-bg: #1e3a5f; --info-text: #93c5fd; --info-border: #1e40af;
    --halt-border: #7f1d1d; --halt-input-border: #991b1b;
    --pre-bg: #1c1917; --inline-code-bg: #3f3a36;
    --diff-bg: #292524; --diff-add-bg: #14532d; --diff-add-text: #86efac;
    --diff-del-bg: #450a0a; --diff-del-text: #fca5a5;
    --diff-hunk-bg: #2e1065; --diff-hunk-text: #c4b5fd;
    --syntax-kw: #c4b5fd; --syntax-str: #fdba74; --syntax-cmt: #78716c; --syntax-typ: #67e8f9;
    --terminal-bg: #0c0a09; --terminal-text: #e7e5e4; --terminal-muted: #78716c;
    --overlay: rgba(0, 0, 0, .55); --shadow: rgba(0, 0, 0, .45);
    --shadow-sm: rgba(0, 0, 0, .2);
    --agent-planner-bg: #2e1065; --agent-planner-fg: #c4b5fd;
    --agent-coder-bg: #1e3a5f; --agent-coder-fg: #93c5fd;
    --agent-tester-bg: #14532d; --agent-tester-fg: #86efac;
    --agent-reviewer-bg: #451a03; --agent-reviewer-fg: #fcd34d;
  }
  html { color-scheme: light dark; }
  html[data-theme="light"] { color-scheme: light; }
  html[data-theme="dark"] { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 13px/1.5 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
  svg.ic { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* ===== APP SHELL ===== */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 1440px; margin: 0 auto; background: var(--panel); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

  /* ===== MENUBAR (slim top bar) ===== */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 14px 0 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    height: 40px;
    gap: 0;
  }

  /* Brand zone — aligns with sidebar width */
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 0 16px;
    height: 100%;
    flex-shrink: 0;
    min-width: var(--sidebar-w);
    border-right: 1px solid var(--border);
  }
  .appicon {
    width: 24px; height: 24px; border-radius: 7px;
    background: var(--inverse); color: var(--on-inverse);
    display: grid; place-items: center; flex-shrink: 0;
  }
  .appicon svg.ic { width: 12px; height: 12px; }
  .brand-name { font-weight: 700; font-size: 12.5px; color: var(--text); letter-spacing: -.01em; white-space: nowrap; }

  /* Center — runtime context + status */
  .topbar-center {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    flex: 1;
    min-width: 0;
    height: 100%;
    overflow: hidden;
  }
  .topbar-center .spacer { flex: 1; min-width: 0; }
  .totals { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  /* Runtime chips — shown when a run is active */
  .runtime-strip { display: none; align-items: center; gap: 6px; flex-shrink: 0; }
  .runtime-strip.visible { display: inline-flex; }
  .runtime-sep { width: 1px; height: 12px; background: var(--border); }
  .runtime-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--muted); white-space: nowrap;
  }
  .runtime-chip .lbl { font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--faint); }
  .runtime-chip strong { font-size: 11.5px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
  .runtime-chip.runner strong { color: var(--purple-text); }
  .runtime-chip.model strong { color: var(--info-text); }

  /* Status pill */
  .pill {
    font-size: 10.5px; font-weight: 500;
    padding: 2px 8px; border-radius: 999px;
    background: var(--surface-hover); color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap; flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .5; }
  .pill.active { background: var(--green-bg); color: var(--green-text); border-color: transparent; }
  .pill.active::before { opacity: 1; animation: pulse 1.4s infinite; }
  .pill.halted { background: var(--red-bg); color: var(--red-text); border-color: transparent; }
  .pill.stale { background: var(--amber-bg); color: var(--amber-text); border-color: transparent; }
  .pill.awaiting { background: var(--purple-bg); color: var(--purple-text); border-color: transparent; }

  /* Menubar right — theme toggle only */
  .topbar-end {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 0 0 10px;
    height: 100%;
    flex-shrink: 0;
  }

  /* Shared button base */
  .tb-btn {
    display: inline-flex; align-items: center; gap: 5px;
    font: 500 11.5px inherit;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 7px;
    padding: 4px 9px;
    cursor: pointer;
    white-space: nowrap;
    height: 28px;
    transition: background .1s, border-color .1s;
  }
  .tb-btn:hover { background: var(--surface-muted); }
  .tb-btn svg.ic { opacity: .7; }
  .tb-btn.primary {
    background: var(--inverse); border-color: var(--inverse);
    color: var(--on-inverse); font-weight: 600;
  }
  .tb-btn.primary svg.ic { opacity: 1; }
  .tb-btn.primary:hover { opacity: .88; }
  .tb-btn.danger {
    background: var(--red-bg); border-color: transparent;
    color: var(--red-text);
  }
  #theme-btn { padding: 4px 7px; }

  /* ===== SIDEBAR CONTROL PANEL ===== */
  /* Fixed header inside sidebar — project picker + run controls */
  /* ===== BODY LAYOUT ===== */
  .body { display: flex; flex: 1; min-height: 0; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 10px 4px; }

  /* Section headings — visible, structured labels */
  .side-section { margin-bottom: 2px; }
  .side-heading {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    color: var(--faint); text-transform: uppercase;
    padding: 10px 8px 4px;
  }
  .side-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .side-heading:first-child { padding-top: 4px; }

  /* Project selector row — inside sidebar scroll */
  .project-row {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 30px;
    overflow: hidden;
    margin: 0 0 2px;
  }
  .project-row .proj-icon {
    display: grid; place-items: center;
    width: 30px; height: 30px; flex-shrink: 0;
    color: var(--faint);
  }
  .project-row .proj-icon svg.ic { width: 12px; height: 12px; }
  #project-select {
    font: 600 12px inherit;
    color: var(--text);
    border: none;
    background: transparent;
    padding: 0 8px 0 0;
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 0;
  }

  /* ===== SIDEBAR FOOTER (run controls) ===== */
  /* Pinned at the bottom of the sidebar, aligned with the main composer */
  .sidebar-footer {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--sidebar);
    padding: 10px 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-footer .sf-heading {
    font-size: 9.5px; font-weight: 700; letter-spacing: .08em;
    color: var(--faint); text-transform: uppercase;
    padding-bottom: 2px;
  }
  /* Run history dropdown — full width */
  #run-select {
    width: 100%;
    font: 11px inherit;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface-muted);
    padding: 5px 7px;
    outline: none;
    cursor: pointer;
  }
  #run-select:hover { border-color: var(--neutral); }
  /* Action buttons row */
  .run-controls {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  /* Sidebar action buttons */
  .side-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font: 500 11px inherit;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 7px;
    padding: 5px 9px;
    cursor: pointer;
    white-space: nowrap;
    height: 28px;
    flex-shrink: 0;
    transition: background .1s;
  }
  .side-btn:hover { background: var(--surface-hover); }
  .side-btn svg.ic { width: 12px; height: 12px; opacity: .7; }
  .side-btn.primary {
    flex: 1;
    justify-content: center;
    background: var(--inverse); border-color: var(--inverse);
    color: var(--on-inverse); font-weight: 600;
  }
  .side-btn.primary svg.ic { opacity: 1; }
  .side-btn.primary:hover { opacity: .88; }
  .side-btn.danger {
    background: var(--red-bg); border-color: transparent; color: var(--red-text);
  }

  /* Agent list */
  .agent-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 8px; border-radius: 8px;
    cursor: pointer; transition: background .1s;
  }
  .agent-row:hover { background: var(--surface-hover); }
  .agent-row.selected { background: var(--accent-row); }
  .agent-ico {
    width: 26px; height: 26px; border-radius: 7px;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .agent-ico.planner { background: var(--agent-planner-bg); color: var(--agent-planner-fg); }
  .agent-ico.coder   { background: var(--agent-coder-bg); color: var(--agent-coder-fg); }
  .agent-ico.tester  { background: var(--agent-tester-bg); color: var(--agent-tester-fg); }
  .agent-ico.reviewer{ background: var(--agent-reviewer-bg); color: var(--agent-reviewer-fg); }
  .agent-ico svg.ic { width: 13px; height: 13px; }
  .agent-row .grow { flex: 1; min-width: 0; }
  .agent-row .nm { font-weight: 600; font-size: 12.5px; line-height: 1.25; }
  .agent-row .sub { font-size: 10.5px; color: var(--muted); line-height: 1.25; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--neutral); flex-shrink: 0; }
  .sdot.running { background: var(--green); animation: pulse 1.2s infinite; }
  .sdot.passed  { background: var(--green); }
  .sdot.failed, .sdot.blocked { background: var(--red); }
  @keyframes pulse { 50% { opacity: .35; } }

  .cycle-mini { font-size: 10.5px; color: var(--muted); padding: 0 8px 4px 43px; margin-top: -4px; }
  .ext-history { font-size: 10.5px; color: var(--faint); margin: 2px 0 0 43px; }

  /* ===== STEPPER ===== */
  .stepper { display: flex; align-items: flex-start; padding: 6px 8px 4px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; flex: 1; }
  .step .circ {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--neutral); color: var(--faint);
    display: grid; place-items: center;
    font-size: 10.5px; font-weight: 600;
    background: var(--sidebar); z-index: 1;
  }
  .step .circ svg.ic { width: 11px; height: 11px; }
  .step.done   .circ { background: var(--green); border-color: var(--green); color: var(--on-inverse); }
  .step.active .circ { background: var(--inverse); border-color: var(--inverse); color: var(--on-inverse); }
  .step.failed .circ { background: var(--red); border-color: var(--red); color: var(--on-inverse); }
  .step .lbl { font-size: 9.5px; color: var(--faint); text-align: center; }
  .step::before { content: ''; position: absolute; top: 11px; left: -50%; width: 100%; height: 1.5px; background: var(--neutral); }
  .step:first-child::before { display: none; }
  .step.done::before, .step.active::before { background: var(--green); }

  /* Task box */
  .task-box { padding: 2px 8px 8px; }
  .task-box .task-text { font-size: 12px; line-height: 1.5; }
  .task-box .when { font-size: 10.5px; color: var(--faint); margin-top: 3px; }

  /* ===== MAIN ===== */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Agent header */
  .agent-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface-muted);
  }
  .agent-header .agent-ico { width: 30px; height: 30px; }
  .agent-header .agent-ico svg.ic { width: 15px; height: 15px; }
  .agent-header .nm { font-weight: 700; font-size: 14px; line-height: 1.2; }
  .agent-header .sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .agent-header .runtime-line { font-size: 11.5px; margin-top: 2px; color: var(--muted); }
  .agent-header .runtime-line strong { font-weight: 700; color: var(--text); }
  .agent-header .runtime-line .runner-strong { color: var(--purple-text); }
  .agent-header .runtime-line .model-strong { color: var(--info-text); }
  .agent-header .spacer { flex: 1; }
  .model-badge {
    font-size: 11.5px; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    background: var(--info-bg); color: var(--info-text);
    border: 1px solid var(--info-border);
    white-space: nowrap;
  }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge.running { background: var(--purple-bg); color: var(--purple-text); }
  .badge.passed  { background: var(--green-bg); color: var(--green-text); }
  .badge.failed, .badge.blocked { background: var(--red-bg); color: var(--red-text); }
  .badge.pending { background: var(--surface-hover); color: var(--muted); }
  .badge.awaiting_host { background: var(--purple-bg); color: var(--purple-text); }

  /* Banners */
  #halt-banner {
    display: none;
    background: var(--red-bg); color: var(--red-text);
    font-size: 12px; padding: 9px 20px;
    border-bottom: 1px solid var(--halt-border);
    align-items: center; gap: 10px; flex-wrap: wrap;
  }
  #halt-banner .msg { flex: 1; min-width: 220px; font-weight: 500; }
  #halt-banner .extend { display: flex; align-items: center; gap: 6px; }
  #halt-banner input[type=number] {
    width: 54px; border: 1px solid var(--halt-input-border);
    border-radius: 6px; padding: 3px 6px; font: inherit;
    background: var(--surface); color: var(--text);
  }
  #halt-banner button {
    font: 600 11.5px inherit; border: none;
    background: var(--inverse); color: var(--on-inverse);
    border-radius: 6px; padding: 5px 11px; cursor: pointer; white-space: nowrap;
  }
  #halt-banner button:disabled { opacity: .5; cursor: default; }
  .ext-history-banner { font-size: 10.5px; color: var(--faint); margin: 2px 0 0 0; }
  #archive-banner {
    display: none;
    background: var(--info-bg); color: var(--info-text);
    font-size: 12px; padding: 8px 20px;
    border-bottom: 1px solid var(--info-border);
  }
  #awaiting-banner {
    display: none;
    background: var(--purple-bg); color: var(--purple-text);
    font-size: 12px; padding: 8px 20px;
    border-bottom: 1px solid var(--purple-border);
  }
  #awaiting-banner a { color: inherit; font-weight: 600; }

  /* Feed */
  .feed { flex: 1; overflow-y: auto; padding: 18px 22px 24px; }
  .feed-inner { max-width: 760px; }

  /* Feed virtualization helpers */
  /* content-visibility: auto lets browser skip paint/layout for off-screen blocks */
  .feed-block {
    content-visibility: auto;
    contain-intrinsic-block-size: 40px; /* estimated height hint for scroll accuracy */
  }
  .feed-overflow-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; color: var(--faint); font-size: 11px;
  }
  .feed-overflow-bar::before, .feed-overflow-bar::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .feed-show-all {
    font: 500 11px inherit;
    border: 1px solid var(--border);
    background: var(--surface-muted); color: var(--muted);
    border-radius: 6px; padding: 3px 10px;
    cursor: pointer; white-space: nowrap;
    transition: background .1s;
  }
  .feed-show-all:hover { background: var(--surface-hover); color: var(--text); }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 8px 0; }
  .chip {
    font: 11.5px ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 3.5px 9px; border-radius: 7px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .chip svg.ic { width: 11px; height: 11px; }
  .chip.edit   { background: var(--amber-bg); color: var(--amber-text); }
  .chip.create { background: var(--green-bg); color: var(--green-text); }
  .chip.read   { background: var(--surface-hover); color: var(--muted); }

  .cmdcard {
    font: 11.5px/1.55 ui-monospace, Menlo, monospace;
    background: var(--terminal-bg); color: var(--terminal-text);
    border-radius: 8px; padding: 8px 12px; margin: 8px 0;
    overflow-x: auto; white-space: pre-wrap; word-break: break-all;
  }
  .cmdcard .dollar { color: var(--terminal-muted); }
  .txt { margin: 10px 0; }
  .txt p { margin: 6px 0; }
  .sysline { font-size: 11px; color: var(--faint); margin: 10px 0; font-family: ui-monospace, Menlo, monospace; }
  .errline { font-size: 11.5px; color: var(--red-text); margin: 6px 0; font-family: ui-monospace, Menlo, monospace; }
  .cycle-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0 10px; color: var(--faint);
    font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  }
  .cycle-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .note-card {
    display: flex; align-items: center; gap: 8px;
    background: var(--info-bg); color: var(--info-text);
    border-radius: 8px; padding: 8px 12px; margin: 10px 0; font-size: 12px;
  }
  .sec-label {

// ---- inline SVG icon set (stroke, currentColor) ----
const I = (paths, vb = '0 0 24 24') => `<svg class="ic" viewBox="${vb}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
const ICONS = {

};

const AGENTS = {
  planner:  { icon: 'planner',  sub: 'Spec writer',    desc: 'Turns vague requests into precise specs',           artifacts: ['specs.md'] },
  coder:    { icon: 'coder',    sub: 'Implementation', desc: 'Implements the spec, self-heals until checks pass', artifacts: ['changes.md', 'checker_report.md'] },
  tester:   { icon: 'tester',   sub: 'QA & coverage',  desc: 'Writes rigorous tests for the implementation',      artifacts: ['test_suite.md'] },
  reviewer: { icon: 'reviewer', sub: 'Code review',    desc: 'Read-only security & architecture audit',           artifacts: ['review_report.md', 'diff.patch'] },
};
const STEP_LABELS = { planner: 'Plan', coder: 'Code', tester: 'Test', reviewer: 'Review' };
const ORDER = ['planner', 'coder', 'tester', 'reviewer'];

let state = null;
let runs = [];
let currentRun = '';     // '' = live run, otherwise archived run id
let selected = null;     // manual agent selection; null = follow the running agent
let artifactCache = {};

const urlParams = new URLSearchParams(window.location.search);
let currentProject = urlParams.get('project') || '';
let sseConnection = null;

const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const cap = (s) => s[0].toUpperCase() + s.slice(1);

// Inject icons
document.getElementById('app-ico').innerHTML = ICONS.app;
document.getElementById('project-picker-icon').innerHTML = ICONS.folder;
document.getElementById('followup-send').innerHTML = ICONS.send + ' Send';
document.getElementById('orchestrate-send').innerHTML = ICONS.shuffle + ' Route';

document.getElementById('newrun-btn').innerHTML = ICONS.plus + ' New run';
document.getElementById('cancel-btn').innerHTML = ICONS.stop + ' Stop run';

// ---- theme (light / dark / system) ----
const THEME_KEY = 'orchestrator-theme';
const THEME_CYCLE = ['system', 'light', 'dark'];
const themeMq = window.matchMedia('(prefers-color-scheme: dark)');

function getStoredTheme() {
  const v = localStorage.getItem(THEME_KEY);
  return v === 'light' || v === 'dark' || v === 'system' ? v : 'system';
}
function resolveTheme(pref) {
  if (pref === 'system') return themeMq.matches ? 'dark' : 'light';
  return pref;
}
function themeLabel(pref) {
  return pref === 'light' ? 'Light' : pref === 'dark' ? 'Dark' : 'System';
}
function themeIcon(pref) {
  return pref === 'light' ? ICONS.sun : pref === 'dark' ? ICONS.moon : ICONS.monitor;
}
function applyTheme(pref) {
  document.documentElement.dataset.theme = resolveTheme(pref);
  const btn = document.getElementById('theme-btn');
  if (!btn) return;
  const label = 'Theme: ' + themeLabel(pref);
  btn.innerHTML = themeIcon(pref);
  btn.title = label;
  btn.setAttribute('aria-label', label);
}
function cycleTheme() {
  const cur = getStoredTheme();
  const next = THEME_CYCLE[(THEME_CYCLE.indexOf(cur) + 1) % THEME_CYCLE.length];
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
applyTheme(getStoredTheme());
document.getElementById('theme-btn').onclick = cycleTheme;
themeMq.addEventListener('change', () => {
  if (getStoredTheme() === 'system') applyTheme('system');
});

function hl(code) {
  return esc(code)
    .replace(/(\/\/[^\n]*)/g, '<span class="cmt">$1</span>')
    .replace(/('[^']*'|"[^"]*"|`[^`]*`)/g, '<span class="str">$1</span>')
    .replace(/\b(export|import|from|function|const|let|var|return|async|await|if|else|throw|new|class|interface|type|extends)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(string|number|boolean|void|Promise|Record|Array)\b/g, '<span class="typ">$1</span>');
}

function renderMd(md) {
  const blocks = md.split(/```/);
  let html = '';
  blocks.forEach((block, i) => {
    if (i % 2 === 1) {
      const nl = block.indexOf('\n');
      html += '<pre><code>' + hl(nl >= 0 ? block.slice(nl + 1) : block) + '</code></pre>';
      return;
    }
    const lines = block.split('\n');
    let inList = false, para = [];
    const flush = () => { if (para.length) { html += '<p>' + para.join(' ') + '</p>'; para = []; } };
    const inline = (s) => esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*(?!\s)([^*]+)\*/g, '<em>$1</em>');
    const isTableRow = (l) => /\|/.test(l) && /^\s*\|?.*\|.*$/.test(l);
    const isTableSep = (l) => /^\s*\|?(\s*:?-{2,}:?\s*\|)+\s*:?-{2,}:?\s*\|?\s*$/.test(l) || /^\s*\|(\s*:?-{2,}:?\s*\|)+\s*$/.test(l);
    const splitRow = (l) => l.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map((c) => c.trim());
    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      if (isTableRow(line) && li + 1 < lines.length && isTableSep(lines[li + 1])) {
        flush(); if (inList) { html += '</ul>'; inList = false; }
        const headers = splitRow(line);
        let body = '';
        li += 2;
        while (li < lines.length && isTableRow(lines[li]) && !isTableSep(lines[li])) {
          const cells = splitRow(lines[li]);
          body += '<tr>' + headers.map((_, ci) => `<td>${inline(cells[ci] ?? '')}</td>`).join('') + '</tr>';
          li++;
        }
        li--;
        html += '<table><thead><tr>' + headers.map((hd) => `<th>${inline(hd)}</th>`).join('') + '</tr></thead><tbody>' + body + '</tbody></table>';
        continue;
      }
      const h = line.match(/^(#{1,4})\s+(.*)/);
      if (h) { flush(); if (inList) { html += '</ul>'; inList = false; } html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
      if (/^\s*[-*]\s+/.test(line)) { flush(); if (!inList) { html += '<ul>'; inList = true; } html += '<li>' + inline(line.replace(/^\s*[-*]\s+/, '')) + '</li>'; continue; }
      if (inList && line.trim() === '') { html += '</ul>'; inList = false; continue; }
      if (/^\s*---+\s*$/.test(line)) { flush(); html += '<hr>'; continue; }
      if (line.trim() === '') { flush(); continue; }
      para.push(inline(line));
    }
    flush(); if (inList) html += '</ul>';
  });
  return html;
}

function renderDiff(patch) {
  return patch.split('\n').map((line) => {
    let cls = '';
    if (line.startsWith('+++') || line.startsWith('---') || line.startsWith('diff ') || line.startsWith('index ')) cls = 'meta';
    else if (line.startsWith('@@')) cls = 'hunk';
    else if (line.startsWith('+')) cls = 'add';
    else if (line.startsWith('-')) cls = 'del';
    return `<div class="dl ${cls}">${esc(line) || ' '}</div>`;
  }).join('');
}

function stageOf(name) { return state?.status?.stages?.find((s) => s.name === name); }
function activeAgent() {
  if (selected) return selected;
  const running = state?.status?.stages?.find((s) => s.status === 'running');
  if (running) return running.name;
  const started = (state?.status?.stages || []).filter((s) => s.startedAt);
  return started.length ? started[started.length - 1].name : 'planner';
}
function agoText(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  return m < 1 ? 'Requested just now' : m < 60 ? `Requested ${m} min ago` : `Requested ${Math.floor(m / 60)}h ${m % 60}m ago`;
}
function fmtDur(a, b) {
  if (!a) return '';
  const s = Math.floor(((b ? new Date(b) : new Date()) - new Date(a)) / 1000);
  return s < 60 ? s + 's' : `${Math.floor(s / 60)}m ${s % 60}s`;
}

const RUNNER_LABELS = {
  claude: 'Claude', cursor: 'Cursor', codex: 'Codex',
  gemini: 'Gemini', agy: 'Antigravity', host: 'Chat (host)',
};

function formatRunner(runner) {
  if (!runner) return '—';
  return RUNNER_LABELS[runner] || cap(runner);
}
function runningStageName() {
  return state?.status?.stages?.find((s) => s.status === 'running')?.name || null;
}
function modelForAgent(name) {
  const st = stageOf(name);
  if (st?.model) return st.model;
  return state?.status?.models?.stages?.[name] || null;
}
function currentRuntimeModel() {
  const running = runningStageName();
  if (running) { const m = modelForAgent(running); if (m) return m; }
  const active = activeAgent();
  const activeModel = modelForAgent(active);
  if (activeModel) return activeModel;
  const stages = state?.status?.models?.stages;
  if (stages) { for (const name of ORDER) { if (stages[name]) return stages[name]; } }
  return null;
}

function renderRuntimeStrip() {
  const strip = document.getElementById('runtime-strip');
  const runnerEl = document.getElementById('runtime-runner');
  const modelEl = document.getElementById('runtime-model');
  const s = state?.status;
  if (!s?.runner) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  runnerEl.textContent = formatRunner(s.runner);
  const running = runningStageName();
  const active = activeAgent();
  const currentStageName = running || active;
  const st = stageOf(currentStageName);
  if (s.runner === 'host' && st?.status !== 'passed' && st?.status !== 'failed' && !st?.model) {
    const suggestedModel = state?.status?.models?.stages?.[currentStageName];
    modelEl.innerHTML = `determined by chat ${suggestedModel ? `<span style="opacity: 0.7; font-weight: normal;">(suggested: ${esc(suggestedModel)})</span>` : ''}`;
  } else {
    const model = modelForAgent(currentStageName);
    modelEl.textContent = model || 'default';
  }
}

function agentIco(name) {
  const m = AGENTS[name];
  return `<div class="agent-ico ${name}">${ICONS[m.icon]}</div>`;
}

function renderSidebar() {
  const list = document.getElementById('agent-list');
  const cur = activeAgent();
  list.innerHTML = '';
  for (const name of ORDER) {
    const st = stageOf(name) || { status: 'pending' };
    const row = document.createElement('div');
    row.className = 'agent-row' + (cur === name ? ' selected' : '');
    row.innerHTML = `${agentIco(name)}<div class="grow"><div class="nm">${cap(name)}</div><div class="sub">${AGENTS[name].sub}</div></div><div class="sdot ${st.status}"></div>`;
    row.onclick = () => { switchAgent(name); };
    list.appendChild(row);
    if (name === 'coder' && st.cycle > 0) {
      const mini = document.createElement('div');
      mini.className = 'cycle-mini';
      mini.textContent = `fix cycle ${st.cycle}/${st.maxCycles || '?'}` +
        (st.checks ? ` · ${st.checks.passedCount ?? '?'}✓${st.checks.failedCount ? ' ' + st.checks.failedCount + '✗' : ''}` : '');
      list.appendChild(mini);
      const exts = state?.status?.extensions;
      if (exts?.length) {
        const line = document.createElement('div');
        line.className = 'ext-history';
        line.textContent = `extended ${exts.length}× (+${exts.reduce((a, e) => a + e.addedCycles, 0)} cycles total)`;
        list.appendChild(line);
      }
    }
    if (name === 'reviewer') {
      const rp = state?.status?.reviewPass || 0;
      if (rp > 0) {
        const mini = document.createElement('div');
        mini.className = 'cycle-mini';
        mini.textContent = `fix pass ${rp}/${state?.status?.limits?.reviewMax || '?'}`;
        list.appendChild(mini);
      }
    }
  }

  const stepper = document.getElementById('stepper');
  stepper.innerHTML = '';
  ORDER.forEach((name, i) => {
    const st = stageOf(name) || { status: 'pending' };
    const cls = st.status === 'passed' ? 'done' : st.status === 'running' ? 'active' : (st.status === 'failed' || st.status === 'blocked') ? 'failed' : '';
    const div = document.createElement('div');
    div.className = 'step ' + cls;
    div.innerHTML = `<div class="circ">${st.status === 'passed' ? ICONS.check : i + 1}</div><div class="lbl">${STEP_LABELS[name]}</div>`;
    stepper.appendChild(div);
  });

  if (state?.status) {
    document.getElementById('task-text').textContent = state.status.task;
    document.getElementById('task-when').textContent = agoText(state.status.startedAt);
  }
}

function renderTop() {
  const pill = document.getElementById('active-pill');
  const totals = document.getElementById('totals');
  const cancelBtn = document.getElementById('cancel-btn');
  const s = state?.status;
  cancelBtn.style.display = state?.canCancel ? '' : 'none';
  if (!s) { pill.textContent = 'idle'; pill.className = 'pill'; totals.textContent = ''; renderRuntimeStrip(); return; }

  const parts = [];
  const started = s.stages.filter((x) => x.startedAt).length;
  if (started) parts.push(`${started} agent${started === 1 ? '' : 's'}`);
  if (state.totals?.costUsd > 0) parts.push('$' + state.totals.costUsd.toFixed(2));
  const dur = fmtDur(s.startedAt, s.endedAt);
  if (dur) parts.push(dur);
  totals.textContent = parts.join(' · ');

  if (state.stale) { pill.textContent = 'stale'; pill.className = 'pill stale'; }
  else if (s.overall === 'awaiting_chat') { pill.textContent = `awaiting ${formatRunner(s.runner)}`; pill.className = 'pill awaiting'; }
  else if (s.overall === 'running') { pill.textContent = s.invocationMode === 'chat' ? `${formatRunner(s.runner)} active` : 'running'; pill.className = 'pill active'; }
  else if (s.overall === 'halted') {
    pill.textContent = s.haltReason === 'INTERRUPTED' ? 'stopped' : 'halted';
    pill.className = 'pill halted';
  }
  else { pill.textContent = s.verdict ? `done · ${s.verdict}` : 'done'; pill.className = 'pill active'; }
  renderRuntimeStrip();
}

function getNextAgent(s) {
  if (!s) return null;
  const pt = s.resumePoint;
  if (pt) {
    const step = pt.step;
    if (step === 'planner') return 'planner';
    if (step === 'after_planner') return 'coder';
    if (step === 'coder' || step === 'after_coder') return 'coder';
    if (step === 'tester') return 'tester';
    if (step === 'after_tester') return 'coder';
    if (step === 'reviewer' || step === 'after_reviewer') return 'reviewer';
  }
  const firstNonPassed = s.stages.find(x => x.status !== 'passed');
  return firstNonPassed ? firstNonPassed.name : null;
}

function followupHint(name) {
  const s = state?.status;
  const st = stageOf(name);
  if (st?.status === 'passed') return 'this stage is done — queue on Coder or resume won\'t use this';
  if (state?.canResume) return 'note queued — applies when you resume';
  if (s && s.overall === 'running' && !state.stale) {
    if (st?.status === 'running' && name === 'coder') return 'note queued — next fix cycle';
    if (st?.status === 'running') return 'note queued — applies if stage re-runs, else next run';
    if (st?.status === 'pending') return 'note queued — when agent starts';
  }
  return 'note queued — applies on next run';
}

function renderHeader() {
  const name = activeAgent();
  const st = stageOf(name) || { status: 'pending' };
  const stageModel = modelForAgent(name);
  const runner = state?.status?.runner;
  const isPendingOrRunningInHost = runner === 'host' && st.status !== 'passed' && st.status !== 'failed' && !st.model;
  const runtimeLine = runner
    ? `<div class="runtime-line"><span class="lbl">Agent</span> <strong class="runner-strong">${esc(formatRunner(runner))}</strong>${stageModel ? ` · <span class="lbl">Model</span> <strong class="model-strong">${isPendingOrRunningInHost ? `determined by chat <span style="opacity: 0.7; font-weight: normal;">(suggested: ${esc(stageModel)})</span>` : esc(stageModel)}</strong>` : ''}</div>`
    : '';
  const modelBadge = stageModel ? `<span class="model-badge">${isPendingOrRunningInHost ? 'chat window' : esc(stageModel)}</span>` : '';
  document.getElementById('agent-header').innerHTML = `
    ${agentIco(name)}
    <div><div class="nm">${cap(name)} Agent</div><div class="sub">${AGENTS[name].desc}</div>${runtimeLine}</div>
    <div class="spacer"></div>
    ${modelBadge}
    <span class="badge ${st.status}">${st.status === 'passed' ? 'Completed' : st.status === 'awaiting_host' ? `Awaiting ${formatRunner(state?.status?.runner)}` : cap(st.status)}</span>`;

  const banner = document.getElementById('halt-banner');
  const s = state?.status;
  if (state?.canResume) {
    banner.style.display = 'flex';
    const nextAgent = getNextAgent(s);
    const notesStr = state?.followups?.[nextAgent] || '';
    const notesCount = notesStr.split('\n').filter(x => x.trim()).length;
    const countMsg = notesCount > 0 ? ` (${notesCount} follow-up note${notesCount === 1 ? '' : 's'} queued)` : '';
    banner.innerHTML = `<span class="msg">Run stopped — add guidance below, then resume${esc(countMsg)}</span>
      <button id="resume-btn">Resume run</button>`;
    document.getElementById('resume-btn').onclick = sendResume;
  } else if (s?.haltReason) {
    const failing = s.stages.find((x) => x.status === 'failed' || x.status === 'blocked');
    banner.style.display = 'flex';
    const msg = `${s.haltReason} — ${failing?.detail || 'human intervention required.'}`;
    if (state?.canExtend) {
      const phase = s.haltedPhase;
      const dflt = (phase === 'postTester' ? state?.defaults?.maxPostTesterCycles : phase === 'review' ? state?.defaults?.maxReviewCycles : state?.defaults?.maxCoderCycles) ?? 2;
      banner.innerHTML = `<span class="msg">${esc(msg)}</span>
        <div class="extend">
          <span>Extend by</span>
          <input type="number" id="extend-n" value="${dflt}" min="1" max="20">
          <span>cycles</span>
          <button id="extend-btn">Extend & continue</button>
        </div>`;
      const extHistory = state?.status?.extensions;
      if (extHistory?.length) {
        const line = document.createElement('div');
        line.className = 'ext-history-banner';
        line.textContent = `Extended ${extHistory.length}× (+${extHistory.reduce((a, e) => a + e.addedCycles, 0)} cycles total)`;
        banner.appendChild(line);
      }
      document.getElementById('extend-btn').onclick = sendExtend;
    } else {
      banner.innerHTML = `<span class="msg">${esc(msg)}</span>
        <button id="resume-btn">Resume run</button>`;
      const resumeBtn = document.getElementById('resume-btn');
      if (resumeBtn) resumeBtn.onclick = sendResume;
    }
  } else {
    banner.style.display = 'none';
  }

  const awaitBanner = document.getElementById('awaiting-banner');
  if (s?.overall === 'awaiting_chat') {
    awaitBanner.style.display = '';
    const nextA = getNextAgent(s);
    const artifact = nextA === 'planner' ? 'specs.md' : nextA === 'coder' ? 'changes.md' : nextA === 'tester' ? 'test_suite.md' : 'review_report.md';
    awaitBanner.innerHTML = `Awaiting <strong>${esc(formatRunner(s.runner))}</strong> — write <code>${artifact}</code> in your agent window, then run <code>bash .pipeline/orchestrate.sh --continue</code>`;
  } else {
    awaitBanner.style.display = 'none';
  }

  const archiveBanner = document.getElementById('archive-banner');
  if (currentRun) {
    archiveBanner.style.display = '';
    archiveBanner.textContent = `Viewing archived run — ${currentRun}`;
  } else {
    archiveBanner.style.display = 'none';
  }

  updateFollowupButtons();
}

function chipFor(ev) {
  const t = ev.tool || '';
  if (/^Write$/i.test(t)) return { cls: 'create', icon: ICONS.plus, label: ev.file || t };
  if (/^(Edit|NotebookEdit|MultiEdit)$/i.test(t)) return { cls: 'edit', icon: ICONS.pencil, label: ev.file || t };
  if (/^(Read|Glob|Grep|LS|WebFetch|WebSearch)$/i.test(t)) return { cls: 'read', icon: ICONS.eye, label: ev.file || ev.cmd || t };
  return null;
}

// ---- Feed virtualization ----
// Builds all event segments into an array, then slices to a visible window.
// Older items get an expand button. CSS content-visibility:auto handles
// off-screen paint-skipping for what IS in the DOM.
const FEED_WINDOW = 100; // max event-segments in DOM at once
let feedShowAll = false; // toggled by expand button

function buildEventSegments(events) {
  const segments = []; // each element is an html string for one logical block
  let chipRow = [];
  const flushChips = () => {
    if (chipRow.length) {
      segments.push('<div class="feed-block chips">' + chipRow.map((c) => `<span class="chip ${c.cls}">${c.icon} ${esc(c.label)}</span>`).join('') + '</div>');
      chipRow = [];
    }
  };
  for (const ev of events) {
    if (ev.type === 'agent_start') {
      flushChips();
      if (ev.cycle > 1) segments.push(`<div class="feed-block cycle-divider">Fix cycle ${ev.cycle}</div>`);
      continue;
    }
    if (ev.type === 'checks_start') { flushChips(); segments.push(`<div class="feed-block cycle-divider">Checker · verification</div>`); continue; }
    if (ev.type === 'check_end') { flushChips(); segments.push(`<div class="feed-block sysline">${ev.ok ? '✓' : '✗'} ${esc(ev.check)} ${ev.ok ? 'passed' : 'failed'}</div>`); continue; }
    if (ev.type === 'followup_applied') { flushChips(); segments.push(`<div class="feed-block note-card">${ICONS.pin} Follow-up applied: ${esc(ev.text)}</div>`); continue; }
    if (ev.type === 'chat_handoff') { flushChips(); segments.push(`<div class="feed-block note-card">${ICONS.pin} ${esc(formatRunner(state?.status?.runner))} handoff — write ${esc(ev.artifact || 'artifact')} in agent CLI, then run <code>bash .pipeline/orchestrate.sh --continue</code></div>`); continue; }
    if (ev.type !== 'agent_output') continue;
    if (ev.kind === 'tool') {
      const chip = chipFor(ev);
      if (chip) { chipRow.push(chip); continue; }
      flushChips();
      if (/^Bash$/i.test(ev.tool)) { segments.push(`<div class="feed-block cmdcard"><span class="dollar">$</span> ${esc(ev.cmd || '')}</div>`); continue; }
      segments.push(`<div class="feed-block sysline">${esc(ev.tool)} ${esc(ev.file || ev.cmd || '')}</div>`);
      continue;
    }
    flushChips();
    if (ev.kind === 'sys') segments.push(`<div class="feed-block sysline">${esc(ev.text)}</div>`);
    else if (ev.kind === 'err') segments.push(`<div class="feed-block errline">${esc(ev.text)}</div>`);
    else segments.push(`<div class="feed-block txt">${renderMd(ev.text || '')}</div>`);
  }
  flushChips();
  return segments;
}

function renderFeed() {
  const name = activeAgent();
  const feed = document.getElementById('feed');
  const events = state?.events?.[name] || [];
  const wrap = feed.parentElement;
  const atBottom = wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 40;

  // Build segments
  const segments = buildEventSegments(events);

  // Append artifact cards
  const artifactHtml = [];
  for (const file of AGENTS[name].artifacts) {
    if (!(state?.artifacts || []).includes(file)) continue;
    const content = artifactCache[file];
    if (!content) continue;
    const isDiff = file.endsWith('.patch');
    artifactHtml.push(`<div class="feed-block sec-label">${isDiff ? ICONS.diff : ICONS.doc} Output — ${file}</div>`);
    artifactHtml.push(isDiff
      ? `<div class="feed-block diffcard">${renderDiff(content)}</div>`
      : `<div class="feed-block artifact-card">${renderMd(content)}</div>`);
  }

  // Build final html with optional windowing
  let html = '';
  if (segments.length === 0 && artifactHtml.length === 0) {
    html = '<div class="empty-feed">No activity yet for this agent.</div>';
  } else {
    const overflow = feedShowAll ? 0 : Math.max(0, segments.length - FEED_WINDOW);
    if (overflow > 0) {
      html += `<div class="feed-overflow-bar"><button class="feed-show-all" id="feed-show-all-btn">${overflow} older item${overflow === 1 ? '' : 's'} — show all</button></div>`;
      html += segments.slice(overflow).join('');
    } else {
      html += segments.join('');
    }
    html += artifactHtml.join('');
  }

  // Avoid thrashing the DOM if nothing changed
  const key = name + (feedShowAll ? ':all' : ':win') + '\u0000' + html;
  if (feed._renderKey === key) return;
  if (feed._renderKey !== undefined && feed._renderKey.split('\u0000')[0].startsWith(name) && selectionInside(feed)) return;
  feed._renderKey = key;
  feed.innerHTML = html;

  // Wire up expand button
  const expandBtn = document.getElementById('feed-show-all-btn');
  if (expandBtn) {
    expandBtn.onclick = () => { feedShowAll = true; feed._renderKey = null; renderFeed(); };
  }

  if (atBottom) wrap.scrollTop = wrap.scrollHeight;
}



function selectionInside(el) {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) return false;
  return el.contains(sel.getRangeAt(0).commonAncestorContainer);
}

async function loadArtifacts() {
  const name = activeAgent();
  for (const file of AGENTS[name].artifacts) {
    if (!(state?.artifacts || []).includes(file)) continue;
    try {
      const params = new URLSearchParams();
      if (currentRun) params.set('run', currentRun);
      if (currentProject) params.set('project', currentProject);
      params.set('name', file);
      const r = await fetch('/api/artifact?' + params.toString());
      artifactCache[file] = (await r.json()).content;
    } catch {}
  }
  renderFeed();
}

function renderRunSelect() {
  const sel = document.getElementById('run-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">Current run</option>' + runs.map((r) => {
    const label = `${(r.startedAt || r.id).replace('T', ' ').slice(0, 16)} — ${r.task.slice(0, 28)}${r.task.length > 28 ? '…' : ''} (${r.verdict || r.haltReason || r.overall || '?'})`;
    return `<option value="${esc(r.id)}">${esc(label)}</option>`;
  }).join('');
  sel.value = prev;
}

function renderAll() { renderTop(); renderSidebar(); renderHeader(); renderFeed(); }

// Reset feed window when switching agents manually
function switchAgent(name) {
  if (selected !== name) { feedShowAll = false; }
  selected = name;
  renderAll();
  loadArtifacts();
}

async function fetchState() {
  try {
    const params = new URLSearchParams();
    if (currentRun) params.set('run', currentRun);
    if (currentProject) params.set('project', currentProject);
    const qs = params.toString() ? '?' + params.toString() : '';
    const r = await fetch('/api/state' + qs);
    if (!r.ok) { currentRun = ''; document.getElementById('run-select').value = ''; return fetchState(); }
    state = await r.json();
    renderAll();
    loadArtifacts();
  } catch {}
}
async function fetchRuns() {
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    runs = (await (await fetch('/api/runs' + qs)).json()).runs || [];
    renderRunSelect();
  } catch {}
}

document.getElementById('run-select').onchange = (e) => {
  currentRun = e.target.value;
  selected = null;
  artifactCache = {};
  fetchState();
};

// ---- follow-ups ----
function updateFollowupButtons() {
  const input = document.getElementById('followup-input');
  const hasText = !!input.value.trim();
  const canResume = !!state?.canResume;
  const resumeBtn = document.getElementById('followup-resume');
  if (canResume && hasText) {
    resumeBtn.style.display = 'inline-flex';
  } else {
    resumeBtn.style.display = 'none';
  }
}

async function sendFollowup() {
  const input = document.getElementById('followup-input');
  const text = input.value.trim();
  if (!text || state?.live === false) return;
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    await fetch('/api/followup' + qs, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ stage: activeAgent(), text }) });
    input.value = '';
    updateFollowupButtons();
    fetchState();
  } catch {}
}

async function sendResume() {
  const btn = document.getElementById('resume-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Resuming…'; }
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    const r = await fetch('/api/resume' + qs, { method: 'POST' });
    const out = await r.json();
    if (out.error) { alert(out.error); if (btn) { btn.disabled = false; btn.textContent = 'Resume run'; } return; }
    setTimeout(fetchState, 600);
  } catch {
    if (btn) { btn.disabled = false; btn.textContent = 'Resume run'; }
  }
}

async function sendFollowupAndResume() {
  const input = document.getElementById('followup-input');
  const text = input.value.trim();
  if (!text || state?.live === false || !state?.canResume) return;
  const resumeBtn = document.getElementById('followup-resume');
  const sendBtn = document.getElementById('followup-send');
  if (resumeBtn) { resumeBtn.disabled = true; }
  if (sendBtn) { sendBtn.disabled = true; }
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    await fetch('/api/followup' + qs, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage: activeAgent(), text })
    });
    input.value = '';
    updateFollowupButtons();
    const r = await fetch('/api/resume' + qs, { method: 'POST' });
    const out = await r.json();
    if (out.error) { alert(out.error); }
    setTimeout(fetchState, 600);
  } catch (err) {
    console.error(err);
  } finally {
    if (resumeBtn) { resumeBtn.disabled = false; }
    if (sendBtn) { sendBtn.disabled = false; }
  }
}

async function sendToOrchestrator() {
  const input = document.getElementById('followup-input');
  const text = input.value.trim();
  if (!text || state?.live === false) return;
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    const res = await fetch('/api/orchestrate' + qs, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const out = await res.json();
    if (out.ok && out.stage) {
      selected = out.stage;
      input.value = '';
      updateFollowupButtons();
      await fetchState();
      const q = document.getElementById('queued-pill');
      if (q) {
        q.style.display = '';
        q.textContent = `routed to ${cap(out.stage)} · ${out.via}`;
      }
    } else {
      alert(out.error || 'Failed to route message');
    }
  } catch (err) {
    console.error(err);
  }
}

document.getElementById('followup-send').onclick = sendFollowup;
document.getElementById('orchestrate-send').onclick = sendToOrchestrator;
document.getElementById('followup-resume').onclick = sendFollowupAndResume;
document.getElementById('followup-input').addEventListener('input', updateFollowupButtons);
document.getElementById('followup-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendFollowup(); });

// ---- run controls ----
const overlay = document.getElementById('newrun-overlay');
function toggleManualModels() {
  const manual = document.querySelector('input[name="nr-model-profile"]:checked')?.value === 'manual';
  document.getElementById('nr-manual-models').classList.toggle('open', manual);
}
document.querySelectorAll('input[name="nr-model-profile"]').forEach((el) => {
  el.addEventListener('change', toggleManualModels);
});
const MODEL_STAGES = ['planner', 'coder', 'tester', 'reviewer'];
const CUSTOM_MODEL_VALUE = '__custom__';

function catalogOptionsHtml(selectedId) {
  const catalog = state?.defaults?.modelCatalog || {};
  const groups = Object.entries(catalog).map(([provider, models]) => {
    const opts = (models || []).map((m) => `<option value="${esc(m.id)}"${m.id === selectedId ? ' selected' : ''}>${esc(m.label)} (${esc(m.id)})</option>`).join('');
    return `<optgroup label="${esc(provider)}">${opts}</optgroup>`;
  }).join('');
  const known = Object.values(catalog).flat().some((m) => m.id === selectedId);
  const customSelected = !known && selectedId ? ' selected' : '';
  return `${groups}<option value="${CUSTOM_MODEL_VALUE}"${customSelected}>Custom…</option>`;
}
function toggleCustomModel(stage) {
  const sel = document.getElementById(`nr-model-${stage}`);
  const custom = document.getElementById(`nr-model-${stage}-custom`);
  custom.classList.toggle('open', sel.value === CUSTOM_MODEL_VALUE);
}
function fillModelPlaceholders(runner) {
  const key = !runner || runner === 'auto' ? 'host' : runner;
  const profiles = state?.defaults?.modelProfiles || {};
  const prof = profiles[key] || profiles.host || {};
  MODEL_STAGES.forEach((stage) => {
    const sel = document.getElementById(`nr-model-${stage}`);
    sel.innerHTML = catalogOptionsHtml(prof[stage]);
    toggleCustomModel(stage);
  });
}

document.getElementById('newrun-btn').onclick = () => {
  const sel = document.getElementById('nr-runner');
  sel.innerHTML = (state?.runners || ['auto', 'claude', 'cursor', 'codex', 'gemini']).map((r) => `<option value="${r}">${r}</option>`).join('');
  sel.onchange = () => fillModelPlaceholders(sel.value);
  MODEL_STAGES.forEach((stage) => {
    document.getElementById(`nr-model-${stage}`).onchange = () => toggleCustomModel(stage);
  });
  document.querySelector('input[name="nr-model-profile"][value="auto"]').checked = true;
  toggleManualModels();
  fillModelPlaceholders(sel.value);
  document.getElementById('nr-err').textContent = '';
  document.getElementById('nr-max-cycles').placeholder = String(state?.defaults?.maxCoderCycles ?? 5);
  document.getElementById('nr-max-post-cycles').placeholder = String(state?.defaults?.maxPostTesterCycles ?? 2);
  overlay.classList.add('open');
  document.getElementById('nr-task').focus();
};

// Both cancel buttons close the modal
document.getElementById('nr-cancel').onclick = () => overlay.classList.remove('open');
document.getElementById('nr-cancel-btn').onclick = () => overlay.classList.remove('open');
overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

document.getElementById('nr-start').onclick = async () => {
  const modelProfile = document.querySelector('input[name="nr-model-profile"]:checked')?.value || 'auto';
  const body = {
    task: document.getElementById('nr-task').value,
    runner: document.getElementById('nr-runner').value,
    sandbox: document.getElementById('nr-sandbox').checked,
    maxCycles: document.getElementById('nr-max-cycles').value || undefined,
    maxPostTesterCycles: document.getElementById('nr-max-post-cycles').value || undefined,
    modelProfile,
  };
  if (modelProfile === 'manual') {
    body.models = {};
    for (const stage of MODEL_STAGES) {
      const sel = document.getElementById(`nr-model-${stage}`);
      body.models[stage] = sel.value === CUSTOM_MODEL_VALUE
        ? document.getElementById(`nr-model-${stage}-custom`).value.trim()
        : sel.value.trim();
    }
  }
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    const r = await fetch('/api/run' + qs, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const out = await r.json();
    if (out.error) { document.getElementById('nr-err').textContent = out.error; return; }
    overlay.classList.remove('open');
    document.getElementById('nr-task').value = '';
    document.getElementById('nr-max-cycles').value = '';
    document.getElementById('nr-max-post-cycles').value = '';
    currentRun = '';
    document.getElementById('run-select').value = '';
    selected = null;
    artifactCache = {};
    setTimeout(() => { fetchState(); fetchRuns(); }, 600);
  } catch { document.getElementById('nr-err').textContent = 'failed to reach server'; }
};

document.getElementById('cancel-btn').onclick = async () => {
  if (!confirm('Stop the active pipeline run?')) return;
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    await fetch('/api/cancel' + qs, { method: 'POST' });
    setTimeout(fetchState, 400);
  } catch {}
};

async function sendExtend() {
  const input = document.getElementById('extend-n');
  const n = parseInt(input.value, 10);
  if (!n || n < 1) return;
  const btn = document.getElementById('extend-btn');
  btn.disabled = true; btn.textContent = 'Extending…';
  try {
    const qs = currentProject ? '?project=' + encodeURIComponent(currentProject) : '';
    const r = await fetch('/api/extend' + qs, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ extend: n }) });
    const out = await r.json();
    if (out.error) { alert(out.error); btn.disabled = false; btn.textContent = 'Extend & continue'; return; }
    setTimeout(fetchState, 600);
  } catch { btn.disabled = false; btn.textContent = 'Extend & continue'; }
}

function connectSSE() {
  const conn = document.getElementById('conn');
  if (sseConnection) { try { sseConnection.close(); } catch {} }
  const sseUrl = '/events' + (currentProject ? '?project=' + encodeURIComponent(currentProject) : '');
  const es = new EventSource(sseUrl);
  sseConnection = es;
  es.onopen = () => { conn.textContent = '● live'; conn.className = 'on'; };
  es.onerror = () => { conn.textContent = '● reconnecting…'; conn.className = ''; };
  es.onmessage = (m) => {
    try {
      if (JSON.parse(m.data).type === 'change' && !currentRun) { fetchState(); fetchRuns(); }
    } catch {}
  };
}

async function fetchProjects() {
  try {
    const r = await fetch('/api/projects');
    const data = await r.json();
    const select = document.getElementById('project-select');
    const prevSelected = select.value || currentProject;
    select.innerHTML = '';
    const list = data.projects || [];
    if (list.length === 0) {
      const opt = document.createElement('option');
      opt.value = ''; opt.textContent = 'No projects registered';
      select.appendChild(opt);
      return;
    }
    list.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.repoRoot;
      opt.textContent = `${p.name} (${p.overall})`;
      if (p.repoRoot === prevSelected) opt.selected = true;
      select.appendChild(opt);
    });
    if (!currentProject && list.length > 0) {
      currentProject = list[0].repoRoot;
      const newUrl = new URL(window.location);
      newUrl.searchParams.set('project', currentProject);
      window.history.replaceState({}, '', newUrl);
    }
  } catch (err) {
    console.error('Failed to fetch projects', err);
  }
}

async function initProject() {
  currentRun = '';
  selected = null;
  artifactCache = {};
  document.getElementById('run-select').value = '';
  await fetchState();
  await fetchRuns();
  connectSSE();
}

async function startApp() {
  await fetchProjects();
  await initProject();
  document.getElementById('project-select').onchange = (e) => {
    currentProject = e.target.value;
    const newUrl = new URL(window.location);
    newUrl.searchParams.set('project', currentProject);
    window.history.pushState({}, '', newUrl);
    initProject();
  };
  setInterval(fetchProjects, 10000);
}

startApp();
setInterval(() => { if (!currentRun) fetchState(); }, 3000);
</script>
</body>
